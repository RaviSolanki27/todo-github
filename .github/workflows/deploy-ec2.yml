name: Deploy Next.js App on EC2 (Self-Hosted Runner)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    # This job runs directly on your EC2 machine where the GitHub runner is installed.
    runs-on: self-hosted

    steps:
      # 1) Pull latest code on the runner workspace.
      - name: Checkout source
        uses: actions/checkout@v4

      # 2) Use a stable Node.js runtime.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3) Install dependencies.
      - name: Install dependencies
        run: npm ci

      # 4) Create .env from a GitHub secret.
      # Add a secret named PROD_ENV that contains the full .env content.
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          ${{ secrets.PROD_ENV }}
          EOF

      # 5) Build Next.js app for production.
      - name: Build app
        run: npm run build

      # 6) Ensure PM2 is installed on EC2.
      - name: Ensure PM2 exists
        run: |
          if ! command -v pm2 >/dev/null 2>&1; then
            npm install -g pm2
          fi

      # 7) Start or restart the app with PM2.
      - name: Restart app with PM2
        run: |
          if pm2 describe nextjs-app >/dev/null 2>&1; then
            pm2 restart nextjs-app --update-env
          else
            pm2 start npm --name "nextjs-app" -- start
          fi
          pm2 save
